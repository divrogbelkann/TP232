<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éco-Océan - Collecte de données</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card .value { font-size: 28px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-export { background: #28a745; margin-right: 10px; }
        .btn-clear { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Éco-Océan</h1>
            <p>Collecte et analyse des déchets plastiques sur les plages</p>
            <p><strong>TP INF232 EC2 - divrogbelkann</strong></p>
        </div>
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('collecte')">📝 Nouvelle collecte</button>
                <button class="tab" onclick="showTab('analyse')">📊 Analyse descriptive</button>
                <button class="tab" onclick="showTab('donnees')">📋 Données collectées</button>
            </div>
            
            <div id="collecte" class="tab-content active">
                <h2>Formulaire de collecte</h2>
                <form id="collectForm">
                    <div class="form-group">
                        <label>Nom de la plage *</label>
                        <input type="text" id="plage" required>
                    </div>
                    <div class="form-group">
                        <label>Date de collecte *</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Quantité de déchets (kg) *</label>
                        <input type="number" id="quantite" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Type de déchet principal *</label>
                        <select id="type">
                            <option>Bouteilles plastique</option>
                            <option>Sachets plastique</option>
                            <option>Filets de pêche</option>
                            <option>Microplastiques</option>
                            <option>Mégots</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nombre de bénévoles</label>
                        <input type="number" id="benevoles" value="1">
                    </div>
                    <button type="submit">✅ Enregistrer la collecte</button>
                </form>
                <div id="message" class="success"></div>
            </div>
            
            <div id="analyse" class="tab-content">
                <h2>📈 Analyse descriptive</h2>
                <div id="statsContainer">Chargement des statistiques...</div>
            </div>
            
            <div id="donnees" class="tab-content">
                <h2>📋 Historique des collectes</h2>
                <div style="margin-bottom: 15px;">
                    <button class="btn-export" onclick="exportToCSV()">📥 Exporter en CSV</button>
                    <button class="btn-clear" onclick="clearAllData()">🗑️ Effacer toutes les données</button>
                </div>
                <div id="tableContainer">Chargement des données...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Initialisation
        document.getElementById('date').valueAsDate = new Date();
        
        // Fonctions de gestion des données
        function getData() {
            const stored = localStorage.getItem('ecoOceanData');
            return stored ? JSON.parse(stored) : [];
        }
        
        function saveData(data) {
            localStorage.setItem('ecoOceanData', JSON.stringify(data));
        }
        
        // Statistiques descriptives
        function calculateStats(data) {
            if (data.length === 0) return null;
            
            const quantites = data.map(d => d.quantite).sort((a,b) => a-b);
            const sum = quantites.reduce((a,b) => a+b, 0);
            const mean = sum / data.length;
            
            let median;
            const mid = Math.floor(quantites.length / 2);
            if (quantites.length % 2 === 0) {
                median = (quantites[mid-1] + quantites[mid]) / 2;
            } else {
                median = quantites[mid];
            }
            
            const typeCount = {};
            data.forEach(d => {
                typeCount[d.type] = (typeCount[d.type] || 0) + 1;
            });
            let mode = null;
            let maxCount = 0;
            for (let [type, count] of Object.entries(typeCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    mode = type;
                }
            }
            
            return {
                totalObservations: data.length,
                totalDechets: sum,
                moyenne: mean.toFixed(2),
                mediane: median.toFixed(2),
                min: Math.min(...quantites),
                max: Math.max(...quantites),
                mode: mode,
                parType: typeCount
            };
        }
        
        function loadAndDisplayStats() {
            const data = getData();
            const stats = calculateStats(data);
            const container = document.getElementById('statsContainer');
            
            if (!stats || data.length === 0) {
                container.innerHTML = '<p style="padding: 20px; text-align: center;">⚠️ Aucune donnée collectée. Commencez par ajouter des données !</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total collectes</h3>
                        <div class="value">${stats.totalObservations}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total déchets</h3>
                        <div class="value">${stats.totalDechets} kg</div>
                    </div>
                    <div class="stat-card">
                        <h3>Moyenne</h3>
                        <div class="value">${stats.moyenne} kg</div>
                    </div>
                    <div class="stat-card">
                        <h3>Médiane</h3>
                        <div class="value">${stats.mediane} kg</div>
                    </div>
                    <div class="stat-card">
                        <h3>Minimum</h3>
                        <div class="value">${stats.min} kg</div>
                    </div>
                    <div class="stat-card">
                        <h3>Maximum</h3>
                        <div class="value">${stats.max} kg</div>
                    </div>
                    <div class="stat-card">
                        <h3>Déchet le + fréquent</h3>
                        <div class="value">${stats.mode}</div>
                    </div>
                </div>
                <h3 style="margin-top: 30px;">📊 Fréquences par type de déchet</h3>
                <table>
                    <thead><tr><th>Type de déchet</th><th>Fréquence</th><th>Pourcentage</th></tr></thead>
                    <tbody>
                        ${Object.entries(stats.parType).map(([type, count]) => `
                            <tr><td>${type}</td><td>${count}</td><td>${((count/stats.totalObservations)*100).toFixed(1)}%</td></tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function loadAndDisplayTable() {
            const data = getData();
            const container = document.getElementById('tableContainer');
            
            if (data.length === 0) {
                container.innerHTML = '<p style="padding: 20px; text-align: center;">📭 Aucune donnée collectée pour le moment.</p>';
                return;
            }
            
            const sortedData = [...data].sort((a,b) => new Date(b.date) - new Date(a.date));
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Plage</th>
                            <th>Quantité (kg)</th>
                            <th>Type de déchet</th>
                            <th>Bénévoles</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedData.forEach(item => {
                html += `
                    <tr>
                        <td>${item.date}</td>
                        <td>${item.plage}</td>
                        <td>${item.quantite}</td>
                        <td>${item.type}</td>
                        <td>${item.benevoles}</td>
                        <td><button onclick="deleteItem(${item.id})" style="background:#dc3545; padding:5px 10px; color:white; border:none; border-radius:5px; cursor:pointer;">❌</button></td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        window.deleteItem = function(id) {
            let data = getData();
            data = data.filter(item => item.id !== id);
            saveData(data);
            loadAndDisplayStats();
            loadAndDisplayTable();
        };
        
        window.clearAllData = function() {
            if (confirm('⚠️ Êtes-vous sûr de vouloir effacer TOUTES les données ? Cette action est irréversible.')) {
                saveData([]);
                loadAndDisplayStats();
                loadAndDisplayTable();
                alert('✅ Toutes les données ont été effacées.');
            }
        };
        
        window.exportToCSV = function() {
            const data = getData();
            if (data.length === 0) {
                alert('Aucune donnée à exporter');
                return;
            }
            
            let csv = 'Date,Plage,Quantité (kg),Type de déchet,Nombre de bénévoles\n';
            data.forEach(item => {
                csv += `"${item.date}","${item.plage}",${item.quantite},"${item.type}",${item.benevoles}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `eco-ocean_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };
        
        window.showTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'analyse') loadAndDisplayStats();
            if (tabName === 'donnees') loadAndDisplayTable();
        };
        
        // Formulaire
        document.getElementById('collectForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newData = {
                id: Date.now(),
                plage: document.getElementById('plage').value,
                date: document.getElementById('date').value,
                quantite: parseFloat(document.getElementById('quantite').value),
                type: document.getElementById('type').value,
                benevoles: parseInt(document.getElementById('benevoles').value)
            };
            
            let data = getData();
            data.push(newData);
            saveData(data);
            
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.innerHTML = '✅ Donnée enregistrée avec succès !';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
            
            document.getElementById('collectForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            
            loadAndDisplayStats();
        });
        
        // Chargement initial
        loadAndDisplayStats();
        loadAndDisplayTable();
    </script>
</body>
</html>
